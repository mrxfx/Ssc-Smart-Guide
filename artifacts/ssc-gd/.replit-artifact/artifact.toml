kind = "web"
previewPath = "/"
title = "SSC GD Smart Coach"
version = "1.0.0"
id = "artifacts/ssc-gd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24765

[services.development]
run = "pnpm --filter @workspace/ssc-gd run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ssc-gd", "run", "build" ]
publicDir = "artifacts/ssc-gd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24765"
BASE_PATH = "/"
